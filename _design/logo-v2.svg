<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!--
    LocalRedact logo
    The mark: a document with a single black horizontal bar
    through its middle third. That bar IS the product.
    No ornamentation. No gradients. No effects.
    The idea is the logo.
  -->

  <!-- Document body -->
  <rect x="1" y="1" width="28" height="36" rx="2.5"
    fill="white" stroke="#D6D1C9" stroke-width="1.5"/>

  <!-- Folded corner — architectural notch, not decorative -->
  <path d="M19.5 1 L29 10.5" stroke="#D6D1C9" stroke-width="1.5"/>
  <path d="M19.5 1 L19.5 10.5 L29 10.5"
    fill="#F0EDE8" stroke="#D6D1C9" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Text lines above bar (document simulation) -->
  <rect x="5" y="5.5" width="10" height="1.5" rx="0.75" fill="#D6D1C9"/>
  <rect x="5" y="9" width="14" height="1.5" rx="0.75" fill="#D6D1C9"/>

  <!-- THE REDACTION BAR
       Black. Full width. No border-radius.
       This is not a design choice — it is what redaction IS. -->
  <rect x="1" y="15" width="28" height="7" fill="#1A1610"/>

  <!-- Text lines below bar -->
  <rect x="5" y="25.5" width="12" height="1.5" rx="0.75" fill="#D6D1C9"/>
  <rect x="5" y="29" width="8" height="1.5" rx="0.75" fill="#D6D1C9"/>
  <rect x="5" y="32.5" width="14" height="1.5" rx="0.75" fill="#D6D1C9"/>

  <!--
    Wordmark
    "local" — regular weight, warm gray
    "redact" — heavy weight, near-black
    Single family. Weight contrast carries the hierarchy.
    The red on "redact" is the only color decision.
  -->

  <!-- Using system-safe fallback since SVG text rendering varies -->
  <!-- In production, render as HTML with the actual typeface -->

  <text
    x="44" y="22"
    font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#9A9086"
    letter-spacing="-0.6">local</text>

  <text
    x="44" y="42"
    font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="20"
    font-weight="800"
    fill="#C82020"
    letter-spacing="-0.8">redact</text>

  <!--
    The proportional gap between "local" and "redact" is intentional.
    Two words. Two ideas. One product.
    The stacking creates a reading pause that mirrors the act of reviewing
    before redacting — read, then decide.
  -->
</svg>
