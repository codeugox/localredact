commands:
  install: npm install
  typecheck: npx tsc --noEmit
  build: npx vite build
  test: npx vitest run --reporter=verbose
  lint: npx tsc --noEmit
  dev: npx vite --port 5173

services:
  web:
    start: npx vite --port 5173 --host
    stop: lsof -ti :5173 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:5173
    port: 5173
    depends_on: []

  preview:
    start: npx vite build && npx vite preview --port 5174 --host
    stop: lsof -ti :5174 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:5174
    port: 5174
    depends_on: []
