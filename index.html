<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browser-based PII redaction for PDFs. Remove names, SSNs, and account numbers before sharing. Nothing leaves your browser." />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'none'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; worker-src 'self' blob:" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Local Redact</title>
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <div style="text-align:center;padding:60px 20px;font-family:system-ui">
        <h1>JavaScript Required</h1>
        <p>Local Redact requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
    <script>
      if (!window.Worker || !window.File || !window.Promise) {
        document.getElementById('app').innerHTML =
          '<div style="text-align:center;padding:60px 20px;font-family:system-ui">' +
          '<h1>Browser Not Supported</h1>' +
          '<p>Local Redact requires a modern browser with Web Worker support.</p>' +
          '<p>Please use Chrome 118+, Firefox 115+, Safari 16.4+, or Edge 118+.</p></div>';
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
